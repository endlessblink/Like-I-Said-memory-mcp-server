version: '3.8'

services:
  like-i-said-mcp:
    build: .
    container_name: like-i-said-mcp-server
    restart: unless-stopped
    ports:
      - "3001:3001"    # Dashboard port
      - "3002:3002"    # MCP HTTP port (optional)
    volumes:
      - ./memories:/app/memories
      - ./logs:/app/logs
    environment:
      - MEMORY_MODE=markdown
      - PROJECT_ROOT=/app
      - NODE_ENV=production
      - PORT=3001
      - MCP_HTTP_PORT=3002
    networks:
      - mcp-network

  # Optional: Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: like-i-said-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  redis_data: